<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yakeen NEET Gujarati 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+Gujarati:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   FULL STYLE
========================= */

:root{
  --bg:#0d0f1a;
  --bg2:#13172b;
  --bg3:#1a1f38;
  --text:#ffffff;
  --muted:#9aa4c7;
  --border:rgba(255,255,255,0.08);

  --physics:#38bdf8;
  --chem:#f472b6;
  --botany:#4ade80;
  --zoo:#fb923c;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Baloo 2','Noto Sans Gujarati',sans-serif;
  overflow-x:hidden;
}

/* HEADER */

header{
  position:sticky;
  top:0;
  z-index:100;
  background:linear-gradient(135deg,#0d0f1a,#1d1040);
  border-bottom:1px solid var(--border);
  padding:16px 20px;
}

.header-inner{
  max-width:1300px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo{
  display:flex;
  gap:12px;
  align-items:center;
}

.logo-icon{
  font-size:30px;
}

.logo-title{
  font-size:22px;
  font-weight:800;
  background:linear-gradient(90deg,#38bdf8,#818cf8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.logo-sub{
  font-size:12px;
  color:var(--muted);
}

.header-stats{
  display:flex;
  gap:12px;
}

.stat-pill{
  background:var(--bg3);
  padding:7px 14px;
  border-radius:999px;
  font-size:13px;
  border:1px solid var(--border);
}

/* SUBJECT NAV */

.subject-nav{
  display:flex;
  overflow-x:auto;
  scrollbar-width:none;
  background:var(--bg2);
}

.subject-nav::-webkit-scrollbar{
  display:none;
}

.subject-btn{
  background:none;
  border:none;
  color:var(--muted);
  padding:16px 22px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  white-space:nowrap;
  border-bottom:3px solid transparent;
}

.subject-btn.active{
  color:var(--subject-color);
  border-bottom-color:var(--subject-color);
}

/* SEARCH */

.search-wrap{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

.search-box{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:999px;
  padding:0 18px;
  display:flex;
  align-items:center;
  gap:10px;
}

.search-box input{
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:white;
  padding:14px 0;
  font-size:15px;
  font-family:inherit;
}

.clear-btn{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* MAIN */

main{
  max-width:1300px;
  margin:auto;
  padding:20px;
}

.subject-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:24px;
}

.subject-icon{
  width:54px;
  height:54px;
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}

.subject-header h2{
  font-size:25px;
  font-weight:800;
}

.subject-header p{
  color:var(--muted);
  font-size:13px;
}

/* GRID */

.chapters-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;
}

.chapter-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px;
  cursor:pointer;
  transition:0.2s;
}

.chapter-card:hover{
  transform:translateY(-4px);
}

.chapter-name{
  font-size:16px;
  font-weight:700;
  margin-bottom:14px;
}

.chapter-badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.badge{
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  background:rgba(255,255,255,0.06);
}

.videos{
  color:#38bdf8;
}

.notes{
  color:#4ade80;
}

.dpp{
  color:#fb923c;
}

/* MODAL */

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.82);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.modal{
  width:100%;
  max-width:800px;
  max-height:92vh;
  overflow:hidden;
  border-radius:20px;
  background:var(--bg2);
  border:1px solid var(--border);
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:22px;
  border-bottom:1px solid var(--border);
}

.modal-header h2{
  font-size:20px;
}

.modal-close{
  width:36px;
  height:36px;
  border:none;
  border-radius:10px;
  background:var(--bg3);
  color:white;
  cursor:pointer;
}

.modal-tabs{
  display:flex;
  gap:10px;
  padding:18px;
  border-bottom:1px solid var(--border);
}

.modal-tab{
  border:none;
  background:var(--bg3);
  color:white;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.modal-tab.active{
  background:#38bdf8;
  color:black;
}

.modal-body{
  padding:20px;
  overflow-y:auto;
  max-height:70vh;
}

.resource-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.resource-item{
  background:var(--bg3);
  border-radius:12px;
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
  transition:0.2s;
}

.resource-item:hover{
  transform:translateX(4px);
}

.r-title{
  flex:1;
}

.player-wrap{
  margin-top:18px;
  border-radius:18px;
  overflow:hidden;
  display:none;
  background:black;
}

.player-wrap iframe{
  width:100%;
  height:430px;
  border:none;
}

/* MOBILE */

@media(max-width:700px){

  .chapters-grid{
    grid-template-columns:1fr;
  }

  .header-stats{
    display:none;
  }

  .player-wrap iframe{
    height:230px;
  }

}

</style>
</head>

<body>

<!-- HEADER -->

<header>

  <div class="header-inner">

    <div class="logo">

      <div class="logo-icon">🎯</div>

      <div>
        <div class="logo-title">Yakeen NEET</div>
        <div class="logo-sub">Gujarati 2026</div>
      </div>

    </div>

    <div class="header-stats" id="headerStats"></div>

  </div>

</header>

<!-- SUBJECT NAV -->

<nav class="subject-nav" id="subjectNav"></nav>

<!-- SEARCH -->

<div class="search-wrap">

  <div class="search-box">

    <span>🔍</span>

    <input type="text" id="searchInput" placeholder="Chapter શોધો...">

    <button class="clear-btn" id="clearSearch">✕</button>

  </div>

</div>

<!-- MAIN -->

<main id="mainContent">

  <h2>Loading...</h2>

</main>

<!-- MODAL -->

<div class="modal-overlay" id="modalOverlay">

  <div class="modal">

    <div class="modal-header">

      <h2 id="modalTitle"></h2>

      <button class="modal-close" id="modalClose">✕</button>

    </div>

    <div class="modal-tabs" id="modalTabs"></div>

    <div class="modal-body" id="modalBody"></div>

  </div>

</div>

<script>

/* =========================
   SUBJECT CONFIG
========================= */

const SUBJECTS = {

  Physics:{
    emoji:'⚡',
    color:'#38bdf8',
    bg:'rgba(56,189,248,0.1)'
  },

  Chemistry:{
    emoji:'🧪',
    color:'#f472b6',
    bg:'rgba(244,114,182,0.1)'
  },

  Botany:{
    emoji:'🌿',
    color:'#4ade80',
    bg:'rgba(74,222,128,0.1)'
  },

  Zoology:{
    emoji:'🐾',
    color:'#fb923c',
    bg:'rgba(251,146,60,0.1)'
  }

};

const TABS = [

  {key:'videos',label:'Videos'},
  {key:'notes',label:'Notes'},
  {key:'dppNotes',label:'DPP Notes'},
  {key:'dppVideos',label:'DPP Videos'}

];

let allData = {};
let activeSubject = 'Physics';

/* =========================
   LOAD DATA.JSON
========================= */

async function init(){

  try{

    const res = await fetch('data.json');

    allData = await res.json();

    buildStats();

    buildNav();

    renderSubject(activeSubject);

    setupSearch();

  }catch(e){

    document.getElementById('mainContent').innerHTML =
    '<h2 style="color:red">❌ data.json load failed</h2>';

  }

}

/* =========================
   STATS
========================= */

function buildStats(){

  let total = 0;

  Object.values(allData).forEach(v=>{
    total += v.length;
  });

  document.getElementById('headerStats').innerHTML =
  `
    <div class="stat-pill">
      📚 ${total} Chapters
    </div>
  `;

}

/* =========================
   NAVIGATION
========================= */

function buildNav(){

  const nav = document.getElementById('subjectNav');

  nav.innerHTML = '';

  Object.entries(SUBJECTS).forEach(([name,cfg])=>{

    const btn = document.createElement('button');

    btn.className =
      'subject-btn' +
      (name===activeSubject ? ' active':'');

    btn.style.setProperty('--subject-color',cfg.color);

    btn.innerHTML =
    `
      ${cfg.emoji} ${name}
    `;

    btn.onclick = ()=>{

      activeSubject = name;

      document.querySelectorAll('.subject-btn')
      .forEach(b=>b.classList.remove('active'));

      btn.classList.add('active');

      renderSubject(name);

    };

    nav.appendChild(btn);

  });

}

/* =========================
   SUBJECT PAGE
========================= */

function renderSubject(subject){

  const main = document.getElementById('mainContent');

  const chapters = allData[subject] || [];

  const cfg = SUBJECTS[subject];

  main.innerHTML =
  `
    <div class="subject-header">

      <div class="subject-icon"
      style="background:${cfg.bg}">
        ${cfg.emoji}
      </div>

      <div>
        <h2 style="color:${cfg.color}">
          ${subject}
        </h2>

        <p>
          ${chapters.length} Chapters
        </p>
      </div>

    </div>

    <div class="chapters-grid" id="chaptersGrid"></div>
  `;

  const grid = document.getElementById('chaptersGrid');

  chapters.forEach(ch=>{

    const card = document.createElement('div');

    card.className = 'chapter-card';

    card.innerHTML =
    `
      <div class="chapter-name">
        ${ch.name}
      </div>

      <div class="chapter-badges">

        <span class="badge videos">
          ▶️ ${ch.videos.length}
        </span>

        <span class="badge notes">
          📄 ${ch.notes.length}
        </span>

        <span class="badge dpp">
          📝 ${ch.dppNotes.length}
        </span>

      </div>
    `;

    card.onclick = ()=>openModal(ch);

    grid.appendChild(card);

  });

}

/* =========================
   SEARCH
========================= */

function setupSearch(){

  const input = document.getElementById('searchInput');

  input.addEventListener('input',()=>{

    const q = input.value.toLowerCase();

    if(!q){

      renderSubject(activeSubject);

      return;

    }

    const chapters =
      (allData[activeSubject] || [])
      .filter(ch=>
        ch.name.toLowerCase().includes(q)
      );

    const main = document.getElementById('mainContent');

    main.innerHTML =
    `
      <div class="chapters-grid" id="chaptersGrid"></div>
    `;

    const grid = document.getElementById('chaptersGrid');

    chapters.forEach(ch=>{

      const card = document.createElement('div');

      card.className='chapter-card';

      card.innerHTML =
      `
        <div class="chapter-name">
          ${ch.name}
        </div>
      `;

      card.onclick = ()=>openModal(ch);

      grid.appendChild(card);

    });

  });

}

/* =========================
   MODAL
========================= */

function openModal(chapter){

  document.getElementById('modalTitle').innerText =
  chapter.name;

  const tabs = document.getElementById('modalTabs');

  tabs.innerHTML = '';

  TABS.forEach((tab,index)=>{

    const btn = document.createElement('button');

    btn.className =
      'modal-tab' +
      (index===0 ? ' active':'');

    btn.innerText = tab.label;

    btn.onclick = ()=>{

      document.querySelectorAll('.modal-tab')
      .forEach(b=>b.classList.remove('active'));

      btn.classList.add('active');

      renderTab(chapter,tab.key);

    };

    tabs.appendChild(btn);

  });

  renderTab(chapter,'videos');

  document.getElementById('modalOverlay')
  .style.display='flex';

}

function renderTab(chapter,key){

  const body = document.getElementById('modalBody');

  const items = chapter[key] || [];

  if(!items.length){

    body.innerHTML =
    '<h3>No Content</h3>';

    return;

  }

  body.innerHTML =
  `
    <div class="resource-list"></div>

    <div class="player-wrap" id="playerWrap">

      <iframe
        id="videoFrame"
        allowfullscreen
        allow="autoplay; encrypted-media"
        referrerpolicy="no-referrer"
      ></iframe>

    </div>
  `;

  const list = body.querySelector('.resource-list');

  items.forEach((item,index)=>{

    const div = document.createElement('div');

    div.className='resource-item';

    div.innerHTML =
    `
      <span>${index+1}</span>

      <span>▶️</span>

      <span class="r-title">
        ${item.title}
      </span>

      <span>↗</span>
    `;

    div.onclick = ()=>{

      if(item.url){

        openProtectedPlayer(item.url);

      }

    };

    list.appendChild(div);

  });

}

/* =========================
   PROTECTED PLAYER
========================= */

function openProtectedPlayer(url){

  const wrap = document.getElementById('playerWrap');

  const frame = document.getElementById('videoFrame');

  wrap.style.display='block';

  const realUrl = atob(btoa(url));

  frame.src =
  "https://iframe.mediadelivery.net/play/" +
  btoa(realUrl);

}

/* =========================
   CLOSE MODAL
========================= */

function closeModal(){

  document.getElementById('modalOverlay')
  .style.display='none';

  const frame = document.getElementById('videoFrame');

  if(frame){
    frame.src='';
  }

}

document.getElementById('modalClose')
.onclick = closeModal;

document.getElementById('modalOverlay')
.onclick = function(e){

  if(e.target.id==='modalOverlay'){
    closeModal();
  }

};

/* =========================
   PROTECTION
========================= */

document.addEventListener('contextmenu',
e=>e.preventDefault());

document.addEventListener('keydown',function(e){

  if(
    e.key==='F12' ||
    (e.ctrlKey && e.shiftKey && e.key==='I') ||
    (e.ctrlKey && e.key==='u')
  ){
    e.preventDefault();
  }

});

/* =========================
   START
========================= */

init();

</script>

</body>
</html>
