<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Yakeen NEET Gujarati 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans+Gujarati:wght@400;600;700&display=swap" rel="stylesheet"/>

<style>

/* =========================================
   YAKEEN NEET GUJARATI 2026 — FULL CSS
========================================= */

:root {
  --bg: #0d0f1a;
  --bg2: #13172b;
  --bg3: #1a1f38;
  --border: rgba(255,255,255,0.07);
  --text: #e8ecf8;
  --text-muted: #7a82a8;
  --accent-physics: #38bdf8;
  --accent-chemistry: #f472b6;
  --accent-botany: #4ade80;
  --accent-zoology: #fb923c;
  --accent-notices: #a78bfa;
  --accent: #38bdf8;
  --radius: 14px;
  --transition: 0.2s ease;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Baloo 2','Noto Sans Gujarati',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* HEADER */

header{
  background:linear-gradient(135deg,#0d0f1a 0%,#1a1040 100%);
  border-bottom:1px solid var(--border);
  padding:0 24px;
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(12px);
}

.header-inner{
  max-width:1300px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:64px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo-icon{
  font-size:28px;
}

.logo-title{
  font-size:20px;
  font-weight:800;
  background:linear-gradient(90deg,#38bdf8,#818cf8);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.logo-sub{
  font-size:11px;
  color:var(--text-muted);
  font-weight:600;
}

.header-stats{
  display:flex;
  gap:20px;
}

.stat-pill{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--bg3);
  border:1px solid var(--border);
  padding:6px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
}

/* SUBJECT NAV */

.subject-nav{
  display:flex;
  overflow-x:auto;
  scrollbar-width:none;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  justify-content:center;
}

.subject-nav::-webkit-scrollbar{
  display:none;
}

.subject-btn{
  display:flex;
  align-items:center;
  gap:8px;
  padding:0 20px;
  height:52px;
  background:none;
  border:none;
  color:var(--text-muted);
  font-weight:700;
  cursor:pointer;
  border-bottom:3px solid transparent;
  transition:.2s;
  white-space:nowrap;
}

.subject-btn.active{
  color:var(--subject-color);
  border-bottom-color:var(--subject-color);
}

.subject-btn:hover{
  color:white;
}

.s-count{
  background:rgba(255,255,255,0.08);
  padding:2px 7px;
  border-radius:999px;
  font-size:11px;
}

/* SEARCH */

.search-wrap{
  padding:20px 24px 0;
  max-width:1300px;
  margin:auto;
}

.search-box{
  display:flex;
  align-items:center;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:999px;
  padding:0 20px;
  gap:10px;
}

.search-box input{
  flex:1;
  background:none;
  border:none;
  outline:none;
  color:white;
  font-family:inherit;
  font-size:15px;
  padding:14px 0;
}

.clear-btn{
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

/* MAIN */

main{
  max-width:1300px;
  margin:auto;
  padding:24px;
}

/* SUBJECT HEADER */

.subject-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:24px;
}

.subject-header-icon{
  width:52px;
  height:52px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:26px;
}

.subject-header-text h2{
  font-size:24px;
  font-weight:800;
}

/* GRID */

.chapters-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}

/* CHAPTER CARD */

.chapter-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  cursor:pointer;
  transition:.2s;
}

.chapter-card:hover{
  transform:translateY(-3px);
}

.chapter-name{
  font-size:15px;
  font-weight:700;
  margin-bottom:14px;
}

.chapter-badges{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.badge{
  padding:5px 11px;
  border-radius:8px;
  font-size:12px;
  font-weight:600;
  background:rgba(255,255,255,0.05);
}

.badge.videos{
  color:#38bdf8;
}

.badge.notes{
  color:#4ade80;
}

.badge.dpp{
  color:#fb923c;
}

/* MODAL */

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  z-index:300;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal{
  background:var(--bg2);
  width:100%;
  max-width:750px;
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}

.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid var(--border);
}

.modal-close{
  width:34px;
  height:34px;
  border:none;
  border-radius:10px;
  background:var(--bg3);
  color:white;
  cursor:pointer;
}

.modal-tabs{
  display:flex;
  gap:8px;
  padding:16px;
  border-bottom:1px solid var(--border);
}

.modal-tab{
  padding:8px 14px;
  border:none;
  border-radius:8px;
  background:var(--bg3);
  color:white;
  cursor:pointer;
  font-weight:700;
}

.modal-tab.active{
  background:#38bdf8;
  color:black;
}

.modal-body{
  padding:20px;
  max-height:60vh;
  overflow-y:auto;
}

.resource-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.resource-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px;
  background:var(--bg3);
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}

.resource-item:hover{
  transform:translateX(4px);
}

.r-title{
  flex:1;
}

/* VIDEO PLAYER */

.video-player-wrap{
  margin-top:18px;
  border-radius:18px;
  overflow:hidden;
  background:black;
  border:1px solid rgba(255,255,255,0.08);
}

.video-player{
  width:100%;
  height:420px;
  border:none;
}

/* LOADING */

.loading-screen{
  text-align:center;
  padding:60px;
}

/* MOBILE */

@media(max-width:600px){

  .header-stats{
    display:none;
  }

  .chapters-grid{
    grid-template-columns:1fr;
  }

  .modal{
    max-height:95vh;
  }

  .video-player{
    height:220px;
  }

}

</style>
</head>

<body>

<header>
  <div class="header-inner">

    <div class="logo">
      <span class="logo-icon">🎯</span>

      <div>
        <div class="logo-title">Yakeen NEET</div>
        <div class="logo-sub">Gujarati 2026</div>
      </div>
    </div>

    <div class="header-stats" id="headerStats"></div>

  </div>
</header>

<nav class="subject-nav" id="subjectNav"></nav>

<div class="search-wrap">
  <div class="search-box">

    <span>🔍</span>

    <input
      type="text"
      id="searchInput"
      placeholder="Chapter શોધો..."
    >

    <button class="clear-btn" id="clearSearch">✕</button>

  </div>
</div>

<main id="mainContent">

  <div class="loading-screen">
    Loading...
  </div>

</main>

<!-- MODAL -->

<div class="modal-overlay" id="modalOverlay">

  <div class="modal">

    <div class="modal-header">

      <h2 id="modalTitle"></h2>

      <button class="modal-close" id="modalClose">✕</button>

    </div>

    <div class="modal-tabs" id="modalTabs"></div>

    <div class="modal-body" id="modalBody"></div>

  </div>

</div>

<script>

/* =========================================
   DATA.JSON FETCH
========================================= */

let allData = {};

const SUBJECTS = {
  Physics:{emoji:'⚡',color:'#38bdf8',bg:'rgba(56,189,248,0.1)'},
  Chemistry:{emoji:'🧪',color:'#f472b6',bg:'rgba(244,114,182,0.1)'},
  Botany:{emoji:'🌿',color:'#4ade80',bg:'rgba(74,222,128,0.1)'},
  Zoology:{emoji:'🐾',color:'#fb923c',bg:'rgba(251,146,60,0.1)'},
};

const TAB_CONFIG = [
  {key:'videos',label:'Videos'},
  {key:'notes',label:'Notes'},
  {key:'dppNotes',label:'DPP Notes'},
  {key:'dppVideos',label:'DPP Videos'},
];

let activeSubject = 'Physics';

/* INIT */

async function init(){

  try{

    const res = await fetch('data.json');
    allData = await res.json();

    buildStats();
    buildNav();
    renderSubject(activeSubject);
    setupSearch();

  }catch(err){

    document.getElementById('mainContent').innerHTML =
    '<h2 style="color:red">data.json load failed</h2>';

  }

}

/* STATS */

function buildStats(){

  let totalChapters = 0;

  Object.values(allData).forEach(ch=>{
    totalChapters += ch.length;
  });

  document.getElementById('headerStats').innerHTML =
  `
    <div class="stat-pill">📚 ${totalChapters} Chapters</div>
  `;

}

/* NAV */

function buildNav(){

  const nav = document.getElementById('subjectNav');

  nav.innerHTML = '';

  Object.entries(SUBJECTS).forEach(([name,cfg])=>{

    const count = (allData[name] || []).length;

    const btn = document.createElement('button');

    btn.className =
      'subject-btn' +
      (name===activeSubject ? ' active':'');

    btn.style.setProperty('--subject-color',cfg.color);

    btn.innerHTML =
    `
      <span>${cfg.emoji}</span>
      ${name}
      <span class="s-count">${count}</span>
    `;

    btn.onclick = ()=>{

      activeSubject = name;

      document.querySelectorAll('.subject-btn')
      .forEach(b=>b.classList.remove('active'));

      btn.classList.add('active');

      renderSubject(name);

    };

    nav.appendChild(btn);

  });

}

/* SUBJECT RENDER */

function renderSubject(subject){

  const main = document.getElementById('mainContent');

  const chapters = allData[subject] || [];

  const cfg = SUBJECTS[subject];

  main.innerHTML =
  `
    <div class="subject-header">

      <div class="subject-header-icon"
      style="background:${cfg.bg}">
      ${cfg.emoji}
      </div>

      <div class="subject-header-text">
        <h2 style="color:${cfg.color}">
          ${subject}
        </h2>

        <p>${chapters.length} Chapters</p>
      </div>

    </div>

    <div class="chapters-grid" id="chaptersGrid"></div>
  `;

  const grid = document.getElementById('chaptersGrid');

  chapters.forEach(ch=>{

    const card = document.createElement('div');

    card.className = 'chapter-card';

    card.innerHTML =
    `
      <div class="chapter-name">
        ${ch.name}
      </div>

      <div class="chapter-badges">

        <span class="badge videos">
        ▶️ ${ch.videos.length} Videos
        </span>

        <span class="badge notes">
        📄 ${ch.notes.length} Notes
        </span>

      </div>
    `;

    card.onclick = ()=> openModal(ch);

    grid.appendChild(card);

  });

}

/* SEARCH */

function setupSearch(){

  const input = document.getElementById('searchInput');

  input.addEventListener('input',()=>{

    const q = input.value.toLowerCase();

    if(!q){
      renderSubject(activeSubject);
      return;
    }

    const chapters =
      (allData[activeSubject] || [])
      .filter(ch=>ch.name.toLowerCase().includes(q));

    const main = document.getElementById('mainContent');

    main.innerHTML =
    `
      <div class="chapters-grid" id="chaptersGrid"></div>
    `;

    const grid = document.getElementById('chaptersGrid');

    chapters.forEach(ch=>{

      const card = document.createElement('div');

      card.className='chapter-card';

      card.innerHTML =
      `
      <div class="chapter-name">${ch.name}</div>
      `;

      card.onclick = ()=>openModal(ch);

      grid.appendChild(card);

    });

  });

}

/* MODAL */

document.getElementById('modalClose')
.onclick = closeModal;

document.getElementById('modalOverlay')
.onclick = function(e){

  if(e.target.id === 'modalOverlay'){
    closeModal();
  }

};

function openModal(chapter){

  document.getElementById('modalTitle')
  .innerText = chapter.name;

  const tabs = document.getElementById('modalTabs');

  tabs.innerHTML = '';

  TAB_CONFIG.forEach(tab=>{

    const btn = document.createElement('button');

    btn.className='modal-tab';

    btn.innerText = tab.label;

    btn.onclick = ()=>{

      document.querySelectorAll('.modal-tab')
      .forEach(b=>b.classList.remove('active'));

      btn.classList.add('active');

      renderModal(chapter,tab.key);

    };

    tabs.appendChild(btn);

  });

  tabs.firstChild.classList.add('active');

  renderModal(chapter,'videos');

  document.getElementById('modalOverlay')
  .style.display='flex';

}

function renderModal(chapter,key){

  const body = document.getElementById('modalBody');

  const items = chapter[key] || [];

  if(!items.length){

    body.innerHTML =
    '<h3>No Content</h3>';

    return;

  }

  body.innerHTML =
  `
    <div class="resource-list"></div>
    <div class="video-player-wrap" id="playerWrap" style="display:none">
      <iframe
        class="video-player"
        id="videoFrame"
        allowfullscreen
        allow="encrypted-media"
        sandbox="allow-scripts allow-same-origin allow-presentation"
        referrerpolicy="no-referrer">
      </iframe>
    </div>
  `;

  const list = body.querySelector('.resource-list');

  items.forEach((item,i)=>{

    const div = document.createElement('div');

    div.className='resource-item';

    div.innerHTML =
    `
      <span>${i+1}</span>
      <span>▶️</span>
      <span class="r-title">
      ${item.title}
      </span>
    `;

    div.onclick = ()=>{

      if(item.url){

        openProtectedPlayer(item.url);

      }

    };

    list.appendChild(div);

  });

}

/* VIDEO PLAYER PROTECTION */

function openProtectedPlayer(url){

  const wrap = document.getElementById('playerWrap');

  const frame = document.getElementById('videoFrame');

  wrap.style.display='block';

  // base64 encode
  const encoded = btoa(url);

  // decode internally
  const realUrl = atob(encoded);

  // iframe player
  frame.src = realUrl;

}

/* CLOSE */

function closeModal(){

  document.getElementById('modalOverlay')
  .style.display='none';

  const frame = document.getElementById('videoFrame');

  if(frame){
    frame.src='';
  }

}

document.addEventListener('contextmenu',e=>e.preventDefault());

document.addEventListener('keydown',function(e){

  if(
    e.key === 'F12' ||
    (e.ctrlKey && e.shiftKey && e.key === 'I') ||
    (e.ctrlKey && e.key === 'u')
  ){
    e.preventDefault();
  }

});

/* START */

init();

</script>

</body>
</html>
